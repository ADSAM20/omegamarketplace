<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Omega Marketplace</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { margin:0; background:#0b1020; color:#fff; font-family:sans-serif; text-align:center; padding:50px 20px; }
    h1 { color:#4f86ff; }
    button { background:#4f86ff; color:white; border:none; padding:18px 40px; font-size:18px; border-radius:50px; margin:30px 0; width:80%; max-width:300px; cursor:pointer; }
    button:hover { background:#3b82f6; }
    .status { margin:25px 0; font-size:16px; min-height:30px; }
  </style>
</head>
<body>
  <h1>Omega Marketplace</h1>
  <p>Support the Developer</p>
  <button id="payBtn">Support 1 Pi</button>
  <div id="result" class="status">Connecting...</div>

  <script>
  function postJson(url, body) {
    return fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
  }

  async function initPi() {
    const result = document.getElementById("result");
    
    if (!window.Pi) {
      result.textContent = "❌ يرجى فتح التطبيق داخل Pi Browser";
      return;
    }
    
    try {
      await Pi.init({ version: "2.0", sandbox: false });
      result.textContent = "✅ متصل بـ Pi Network";

      // تفعيل زر الدفع
      document.getElementById("payBtn").onclick = async () => {
        result.textContent = "جاري إنشاء الدفع...";
        
        Pi.createPayment({
          amount: 1.0,
          memo: "Support Omega Marketplace",
          metadata: { type: "support" }
        }, {
          onReadyForServerApproval: function(paymentId) {
            result.textContent = "جاري الموافقة...";
            
            postJson("/.netlify/functions/pi-approve", { paymentId })
              .then(res => res.json())
              .then(data => {
                result.textContent = "✅ تمت الموافقة";
              })
              .catch(err => {
                result.textContent = "❌ فشل الموافقة";
                console.error(err);
              });
          },

          onReadyForServerCompletion: function(paymentId, txid) {
            result.textContent = "جاري إتمام الدفع...";
            
            postJson("/.netlify/functions/pi-complete", { paymentId, txid })
              .then(res => res.json())
              .then(data => {
                // تم تعديل الشرط ليتناسب مع pi-complete.js
                if (data.status === "completed" || data.success !== false) {
                  result.innerHTML = "✅ تم الدفع بنجاح! شكراً لك 🎉";
                  document.getElementById("payBtn").style.display = "none";
                } else {
                  result.textContent = "❌ فشل إتمام الدفع";
                }
              })
              .catch(err => {
                result.textContent = "❌ فشل إتمام الدفع";
                console.error(err);
              });
          },

          onCancel: () => result.textContent = "❌ تم إلغاء الدفع",
          onError: (err) => {
            result.textContent = "❌ خطأ: " + (err.message || err);
          }
        });
      };

    } catch (err) {
      result.textContent = "❌ فشل الاتصال: " + err.message;
    }
  }

  // الاستماع للمدفوعات غير المكتملة
  function onIncompletePaymentFound(payment) {
    console.log("Incomplete payment found:", payment);
  }

  // بدء التشغيل
  window.onload = () => {
    Pi.init({ version: "2.0", sandbox: false })
      .then(() => {
        Pi.addIncompletePaymentListener(onIncompletePaymentFound);
        initPi();
      })
      .catch(err => {
        console.error("Init error:", err);
      });
  };
  </script>
