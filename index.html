<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Omega Marketplace</title>
  <!-- استدعاء مكتبة بي -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  
  <style>
    body { margin:0; background:#0b1020; color:#fff; font-family:sans-serif; text-align:center; padding:50px 20px; }
    h1 { color:#4f86ff; }
    button { background:#4f86ff; color:white; border:none; padding:18px 40px; font-size:18px; border-radius:50px; margin:30px 0; width:80%; max-width:300px; cursor:pointer; }
    button:hover { background:#3b82f6; }
    .status { margin:25px 0; font-size:16px; min-height:30px; }
  </style>
</head>
<body>
  <h1>Omega Marketplace</h1>
  <p>Support the Developer</p>
  <button id="payBtn">Support 1 Pi</button>
  <div id="result" class="status">Connecting...</div>

  <!-- الكود البرمجي المعدل -->
                <script>
  function postJson(url, body) {
    return fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
  }

  function onIncompletePaymentFound(payment) {
    console.log("Incomplete payment found:", payment);
  }

  window.onload = async () => {
    const result = document.getElementById("result");
    result.textContent = "جاري الاتصال بـ Pi SDK...";

    if (!window.Pi) {
      result.textContent = "❌ افتح داخل Pi Browser فقط";
      return;
    }

    try {
      // تهيئة الـ SDK
      await Pi.init({ version: "2.0", sandbox: false });
      result.textContent = "✅ متصل - اضغط الزر";

      // مستمع المدفوعات المعلقة
      Pi.addIncompletePaymentListener(onIncompletePaymentFound);

      // زر الدفع
      document.getElementById("payBtn").onclick = async () => {
        result.textContent = "جاري إنشاء الدفع...";

        try {
          await Pi.createPayment({
            amount: 1.0,
            memo: "Support Omega Marketplace",
            metadata: { type: "support" }
          }, {
            onReadyForServerApproval: (paymentId) => {
              result.textContent = "جاري الموافقة...";
              postJson("/.netlify/functions/pi-approve", { paymentId })
                .then(r => r.json())
                .then(() => result.textContent = "✅ تمت الموافقة")
                .catch(() => result.textContent = "❌ فشل الموافقة");
            },

            onReadyForServerCompletion: (paymentId, txid) => {
              result.textContent = "جاري الإتمام...";
              postJson("/.netlify/functions/pi-complete", { paymentId, txid })
                .then(r => r.json())
                .then(() => {
                  result.innerHTML = "✅ تم الدفع بنجاح! شكراً 🎉";
                  document.getElementById("payBtn").style.display = "none";
                })
                .catch(() => result.textContent = "❌ فشل الإتمام");
            },

            onCancel: () => result.textContent = "❌ تم الإلغاء",
            onError: (err) => result.textContent = "❌ خطأ: " + (err.message || err)
          });
        } catch (e) {
          result.textContent = "❌ خطأ في createPayment: " + e.message;
        }
      };

    } catch (err) {
      result.textContent = "❌ فشل تهيئة Pi SDK: " + err.message;
      console.error(err);
    }
  };
  </script>
