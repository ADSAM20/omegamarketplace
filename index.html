<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Omega Marketplace</title>
  <!-- استدعاء مكتبة بي -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  
  <style>
    body { margin:0; background:#0b1020; color:#fff; font-family:sans-serif; text-align:center; padding:50px 20px; }
    h1 { color:#4f86ff; }
    button { background:#4f86ff; color:white; border:none; padding:18px 40px; font-size:18px; border-radius:50px; margin:30px 0; width:80%; max-width:300px; cursor:pointer; }
    button:hover { background:#3b82f6; }
    .status { margin:25px 0; font-size:16px; min-height:30px; }
  </style>
</head>
<body>
  <h1>Omega Marketplace</h1>
  <p>Support the Developer</p>
  <button id="payBtn">Support 1 Pi</button>
  <div id="result" class="status">Connecting...</div>

  <!-- الكود البرمجي المعدل -->
  <script>
  function postJson(url, body) {
    return fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
  }

  // دالة للتعامل مع المدفوعات المعلقة سابقاً
  function onIncompletePaymentFound(payment) {
    console.log("تم العثور على دفع غير مكتمل:", payment);
  }

  window.onload = () => {
    const result = document.getElementById("result");
    
    // 1. التحقق من أن المستخدم يستخدم Pi Browser
    if (!window.Pi) {
      result.textContent = "❌ افتح التطبيق داخل Pi Browser";
      return;
    }
    
    // 2. تهيئة الـ SDK مرة واحدة فقط (تم إزالة التكرار)
    Pi.init({ version: "2.0", sandbox: false });
    
    // 3. إضافة مستمع للمدفوعات غير المكتملة
    Pi.addIncompletePaymentListener(onIncompletePaymentFound);

    // 4. وظيفة زر الدفع
    document.getElementById("payBtn").onclick = () => {
      result.textContent = "جاري إنشاء الدفع...";
      
      Pi.createPayment({
        amount: 1.0,
        memo: "Support Omega Marketplace",
        metadata: { type: "support" }
      }, {
        onReadyForServerApproval: function(paymentId) {
          result.textContent = "جاري الموافقة من السيرفر...";
          
          // إرسال الطلب إلى Netlify Function الخاصة بك
          postJson("/.netlify/functions/pi-approve", { paymentId })
            .then(res => {
               if(!res.ok) throw new Error("Server Error");
               return res.json();
            })
            .then(data => {
              result.textContent = "تمت الموافقة من السيرفر ✅";
            })
            .catch(err => {
              result.textContent = "❌ فشل موافقة السيرفر (تأكد من الـ Backend)";
              console.error("Approve Error:", err);
            });
        },

        onReadyForServerCompletion: function(paymentId, txid) {
          result.textContent = "جاري إتمام الدفع على السيرفر...";
          
          // إرسال الطلب إلى Netlify Function الخاصة بك
          postJson("/.netlify/functions/pi-complete", { paymentId, txid })
            .then(res => {
               if(!res.ok) throw new Error("Server Error");
               return res.json();
            })
            .then(data => {
              result.innerHTML = "✅ تم الدفع بنجاح! شكراً لك 🎉";
              document.getElementById("payBtn").style.display = "none";
            })
            .catch(err => {
              result.textContent = "❌ فشل إتمام الدفع على السيرفر";
              console.error("Complete Error:", err);
            });
        },

        onCancel: () => {
          result.textContent = "❌ تم إلغاء الدفع من قبل المستخدم";
        },
        onError: (err) => {
          result.textContent = "❌ خطأ في الدفع: " + err.message;
          console.error("Payment Error:", err);
        }
      });
    };
  };
  </script>
</body>
  </html>
