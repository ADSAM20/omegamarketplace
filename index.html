<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Omega Marketplace</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { margin:0; background:#0b1020; color:#fff; font-family:sans-serif; text-align:center; padding:50px 20px; }
    h1 { color:#4f86ff; }
    button { background:#4f86ff; color:white; border:none; padding:18px 40px; font-size:18px; border-radius:50px; margin:30px 0; width:80%; max-width:300px; cursor:pointer; }
    button:hover { background:#3b82f6; }
    .status { margin:25px 0; font-size:16px; min-height:30px; }
  </style>
</head>
<body>
  <h1>Omega Marketplace</h1>
  <p>Support the Developer</p>
  <button id="payBtn">Support 1 Pi</button>
  <div id="result" class="status">Connecting...</div>

  <script>
    function postJson(url, body) {
      return fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
    }

    function initPi() {
      const result = document.getElementById("result");
      
      if (!window.Pi) {
        result.textContent = "Pi SDK not found. Open in Pi Browser.";
        return;
      }
      
      // تهيئة Pi SDK
      Pi.init({ version: "2.0", sandbox: true })  // غير إلى false للنشر النهائي
        .then(function() {
          result.textContent = "✅ Connected";
          
          // تفعيل زر الدفع
          document.getElementById("payBtn").onclick = function() {
            result.textContent = "Creating payment...";
            
            Pi.createPayment({
              amount: 1.0,
              memo: "Support Omega Marketplace",
              metadata: { type: "support" }
            }, {
              // المرحلة 9: الموافقة
              onReadyForServerApproval: function(paymentId) {
                result.textContent = "Approving payment...";
                console.log("Approving:", paymentId);
                
                postJson("/.netlify/functions/pi-approve", { paymentId: paymentId })
                  .then(function(res) {
                    return res.json();
                  })
                  .then(function(data) {
                    result.textContent = "Approved ✅";
                    console.log("Approval response:", data);
                  })
                  .catch(function(err) {
                    result.textContent = "❌ Approval failed";
                    console.error("Approval error:", err);
                  });
              },
              
              // المرحلة 10: الإتمام
              onReadyForServerCompletion: function(paymentId, txid) {
                result.textContent = "Completing payment...";
                console.log("Completing:", paymentId, txid);
                
                postJson("/.netlify/functions/pi-complete", { 
                  paymentId: paymentId, 
                  txid: txid 
                })
                  .then(function(res) {
                    return res.json();
                  })
                  .then(function(data) {
                    if (data.success) {
                      result.innerHTML = "✅ Payment Successful! Thank you! 🎉";
                      document.getElementById("payBtn").style.display = "none";
                    } else {
                      result.textContent = "❌ Completion failed";
                    }
                    console.log("Completion response:", data);
                  })
                  .catch(function(err) {
                    result.textContent = "❌ Completion failed";
                    console.error("Completion error:", err);
                  });
              },
              
              onCancel: function() {
                result.textContent = "❌ Payment cancelled";
              },
              
              onError: function(err) {
                result.textContent = "❌ Error: " + err.message;
                console.error("Payment error:", err);
              }
            });
          };
        })
        .catch(function(err) {
          result.textContent = "❌ Init failed: " + err.message;
          console.error("Init error:", err);
        });
    }

    window.onload = initPi;
  </script>
</body>
  </html>
