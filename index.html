<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Omega Marketplace</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { margin:0; background:#0b1020; color:#fff; font-family:sans-serif; text-align:center; padding-top:50px; }
    button { background:#4f86ff; color:white; border:none; padding:18px 40px; font-size:18px; border-radius:50px; margin:20px; }
    .status { margin:20px; font-size:16px; min-height:30px; }
  </style>
</head>
<body>
  <h1>Omega Marketplace</h1>
  <p>Support the Developer</p>
  <button id="payBtn">Support 1 Pi</button>
  <div id="result" class="status"></div>

  <script>
    let isReady = false;

    function init() {
      if (window.Pi) {
        Pi.init({ version: "2.0", sandbox: true }).then(() => {
          isReady = true;
          document.getElementById("result").innerHTML = "✅ Connected";
          setup();
        });
      } else {
        setTimeout(init, 400);
      }
    }

    function setup() {
      document.getElementById("payBtn").onclick = () => {
        const res = document.getElementById("result");
        res.textContent = "Creating payment...";

        Pi.createPayment({
          amount: 1.0,
          memo: "Support Omega Marketplace",
          metadata: { type: "support" }
        }, {
          onReadyForServerApproval: (id) => {
            res.textContent = "Approving...";
            fetch("/.netlify/functions/pi-approve", { method:"POST", body:JSON.stringify({paymentId:id}) });
          },
          onReadyForServerCompletion: (id, txid) => {
            res.textContent = "Completing...";
            fetch("/.netlify/functions/pi-complete", { method:"POST", body:JSON.stringify({paymentId:id, txid}) })
              .then(() => res.innerHTML = "✅ Payment Successful! Thank you");
          },
          onCancel: () => res.textContent = "Cancelled",
          onError: (e) => res.textContent = "Error"
        });
      };
    }

    window.onload = init;
  </script>
</body>
</html>
